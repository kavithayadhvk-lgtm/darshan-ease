name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend/client
        run: npm install

      # Build frontend
      - name: Build frontend
        working-directory: frontend/client
        run: npm run build
